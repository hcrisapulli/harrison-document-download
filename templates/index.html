<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartDocs Sample Generator</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>SmartDocs Sample Generator</h1>
      <p class="subtitle">Select document types, configure options, and download a ZIP of sample PDFs.</p>
    </header>

    <!-- STEP 1: Select types -->
    <section class="step">
      <h2>1. Select Document Types</h2>
      <div class="type-grid" id="typeGrid">
        <label class="type-chip"><input type="checkbox" value="invoice" /> Invoice</label>
        <label class="type-chip"><input type="checkbox" value="receipt" /> Receipt</label>
        <label class="type-chip"><input type="checkbox" value="utility_bill" /> Utility Bill</label>
        <label class="type-chip"><input type="checkbox" value="asic_fee" /> ASIC Fee</label>
        <label class="type-chip"><input type="checkbox" value="bank_statement" /> Bank Statement</label>
        <label class="type-chip"><input type="checkbox" value="contract_note" /> Contract Note</label>
        <label class="type-chip"><input type="checkbox" value="council_rate" /> Council Rate</label>
        <label class="type-chip"><input type="checkbox" value="dividend" /> Dividend</label>
        <label class="type-chip"><input type="checkbox" value="property_settlement" /> Property Settlement</label>
        <label class="type-chip"><input type="checkbox" value="rental_statement" /> Rental Statement</label>
        <label class="type-chip"><input type="checkbox" value="trial_balance" /> Trial Balance</label>
      </div>
      <button type="button" id="selectAllBtn" class="btn btn-secondary">Select All</button>
    </section>

    <!-- STEP 2: Configure cards (shown per selected type) -->
    <section class="step" id="configSection">
      <h2>2. Configure</h2>
      <div id="cards">

        <!-- Invoice -->
        <div class="card" id="card-invoice" style="display:none">
          <div class="card-header"><h3>Invoice</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Supplier name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="supplier_name" /></label>
              <label>Customer name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="customer_name" /></label>
            </div>
            <div class="field-row two-col">
              <label>Subtotal ($) <input type="number" min="1" max="9999999" step="0.01" placeholder="leave blank to randomise" data-field="subtotal" data-clamp /></label>
              <label>Num items
                <select data-field="num_items">
                  <option value="">random</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label class="checkbox-label"><input type="checkbox" data-field="gst_free" /> GST-free</label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder='e.g. "gst-free, subtotal=5000"' maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Receipt -->
        <div class="card" id="card-receipt" style="display:none">
          <div class="card-header"><h3>Receipt</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Business name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="business_name" /></label>
              <label>Customer name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="customer_name" /></label>
            </div>
            <div class="field-row two-col">
              <label>Subtotal ($) <input type="number" min="1" max="9999999" step="0.01" placeholder="leave blank to randomise" data-field="subtotal" data-clamp /></label>
              <label>Num items
                <select data-field="num_items">
                  <option value="">random</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder='e.g. "3 items, subtotal=500"' maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Utility Bill -->
        <div class="card" id="card-utility_bill" style="display:none">
          <div class="card-header"><h3>Utility Bill</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Provider name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="provider_name" /></label>
              <label>Customer name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="customer_name" /></label>
            </div>
            <div class="field-row two-col">
              <label>Usage amount <input type="number" min="1" max="99999" step="0.01" placeholder="leave blank to randomise" data-field="usage_amount" data-clamp /></label>
              <label>Billing days
                <select data-field="billing_days">
                  <option value="">random</option>
                  <option value="30">30 days (monthly)</option>
                  <option value="60">60 days (bi-monthly)</option>
                  <option value="91">91 days (quarterly)</option>
                  <option value="182">182 days (half-yearly)</option>
                  <option value="365">365 days (annual)</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder="free-text instructions" maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- ASIC Fee -->
        <div class="card" id="card-asic_fee" style="display:none">
          <div class="card-header"><h3>ASIC Fee</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Company name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="company_name" /></label>
              <label>ACN <input type="text" placeholder="leave blank to randomise" maxlength="14" data-field="acn" /></label>
            </div>
            <div class="field-row">
              <label>Amount due ($) <input type="number" min="1" max="9999999" step="0.01" placeholder="leave blank to randomise" data-field="amount_due" data-clamp /></label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder="free-text instructions" maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Bank Statement -->
        <div class="card" id="card-bank_statement" style="display:none">
          <div class="card-header"><h3>Bank Statement</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Bank name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="bank_name" /></label>
              <label>Account holder <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="account_holder" /></label>
            </div>
            <div class="field-row two-col">
              <label>Opening balance ($) <input type="number" min="1" max="9999999" step="0.01" placeholder="leave blank to randomise" data-field="opening_balance" data-clamp /></label>
              <label>Num transactions
                <select data-field="num_transactions">
                  <option value="">random</option>
                  <option value="5">5</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                  <option value="20">20</option>
                  <option value="25">25</option>
                  <option value="30">30</option>
                  <option value="40">40</option>
                  <option value="50">50</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder='e.g. "balance=5000"' maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Contract Note -->
        <div class="card" id="card-contract_note" style="display:none">
          <div class="card-header"><h3>Contract Note</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Broker name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="broker_name" /></label>
              <label>Client name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="client_name" /></label>
            </div>
            <div class="field-row two-col">
              <label>Security code <input type="text" placeholder="random (e.g. BHP)" maxlength="6" data-field="security_code" /></label>
              <label>Security name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="security_name" /></label>
            </div>
            <div class="field-row two-col">
              <label>Quantity <input type="number" min="1" max="9999999" placeholder="leave blank to randomise" data-field="quantity" data-clamp /></label>
              <label>Price ($) <input type="number" min="0.01" max="99999" step="0.01" placeholder="leave blank to randomise" data-field="price" data-clamp /></label>
            </div>
            <div class="field-row">
              <label>Trade type
                <select data-field="trade_type">
                  <option value="">random</option>
                  <option value="buy">Buy</option>
                  <option value="sell">Sell</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder='e.g. "buy, code=CBA, price=95.50"' maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Council Rate -->
        <div class="card" id="card-council_rate" style="display:none">
          <div class="card-header"><h3>Council Rate</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Council name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="council_name" /></label>
              <label>Ratepayer name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="ratepayer_name" /></label>
            </div>
            <div class="field-row">
              <label>Property address <input type="text" placeholder="leave blank to randomise" maxlength="80" data-field="property_address" /></label>
            </div>
            <div class="field-row two-col">
              <label>Property value ($) <input type="number" min="1" max="99999999" placeholder="leave blank to randomise" data-field="property_value" data-clamp /></label>
              <label>Total rates ($) <input type="number" min="1" max="999999" step="0.01" placeholder="leave blank to randomise" data-field="total_rates" data-clamp /></label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder="free-text instructions" maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Dividend -->
        <div class="card" id="card-dividend" style="display:none">
          <div class="card-header"><h3>Dividend</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Company name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="company_name" /></label>
              <label>Investor name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="investor_name" /></label>
            </div>
            <div class="field-row two-col">
              <label>Shares <input type="number" min="1" max="9999999" placeholder="leave blank to randomise" data-field="shares" data-clamp /></label>
              <label>Rate per share ($) <input type="number" min="0.0001" max="99999" step="0.0001" placeholder="leave blank to randomise" data-field="rate_per_share" data-clamp /></label>
            </div>
            <div class="field-row">
              <label>Franking %
                <select data-field="franking_percentage">
                  <option value="">random</option>
                  <option value="0">0% (unfranked)</option>
                  <option value="25">25%</option>
                  <option value="50">50%</option>
                  <option value="75">75%</option>
                  <option value="100">100% (fully franked)</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder='e.g. "500 shares, franking=100"' maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Property Settlement -->
        <div class="card" id="card-property_settlement" style="display:none">
          <div class="card-header"><h3>Property Settlement</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Vendor name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="vendor_name" /></label>
              <label>Purchaser name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="purchaser_name" /></label>
            </div>
            <div class="field-row">
              <label>Property address <input type="text" placeholder="leave blank to randomise" maxlength="80" data-field="property_address" /></label>
            </div>
            <div class="field-row two-col">
              <label>Purchase price ($) <input type="number" min="1" max="99999999" placeholder="leave blank to randomise" data-field="purchase_price" data-clamp /></label>
              <label>Deposit paid ($) <input type="number" min="1" max="999999" placeholder="leave blank to randomise" data-field="deposit_paid" data-clamp /></label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder="free-text instructions" maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Rental Statement -->
        <div class="card" id="card-rental_statement" style="display:none">
          <div class="card-header"><h3>Rental Statement</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Agency name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="agency_name" /></label>
              <label>Owner name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="owner_name" /></label>
            </div>
            <div class="field-row">
              <label>Property address <input type="text" placeholder="leave blank to randomise" maxlength="80" data-field="property_address" /></label>
            </div>
            <div class="field-row two-col">
              <label>Period from <input type="text" placeholder="e.g. 01/07/2025" maxlength="10" data-field="period_from" /></label>
              <label>Period to <input type="text" placeholder="e.g. 30/06/2026" maxlength="10" data-field="period_to" /></label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder="free-text instructions" maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

        <!-- Trial Balance -->
        <div class="card" id="card-trial_balance" style="display:none">
          <div class="card-header"><h3>Trial Balance</h3></div>
          <div class="card-body">
            <div class="field-row">
              <label>How many?
                <select data-field="count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
            </div>
            <div class="field-row two-col">
              <label>Company name <input type="text" placeholder="leave blank to randomise" maxlength="60" data-field="company_name" /></label>
              <label>Company ABN <input type="text" placeholder="leave blank to randomise" maxlength="14" data-field="company_abn" /></label>
            </div>
            <div class="field-row">
              <label>Balance date <input type="text" placeholder="e.g. 30/06/2025" maxlength="10" data-field="balance_date" /></label>
            </div>
            <div class="field-row">
              <label>Instructions <input type="text" placeholder="free-text instructions" maxlength="200" data-field="instruction" class="instruction-field" /></label>
            </div>
          </div>
        </div>

      </div><!-- /#cards -->
    </section>

    <!-- STEP 3: Generate -->
    <section class="step action-section">
      <div id="errorBanner" class="error-banner" style="display:none"></div>
      <button type="button" id="generateBtn" class="btn btn-primary" disabled>
        <span id="btnText">Generate &amp; Download ZIP</span>
        <span id="btnSpinner" class="spinner" style="display:none"></span>
      </button>
    </section>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
